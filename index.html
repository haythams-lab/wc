*{box-sizing:border-box;margin:0;padding:0}
body,html{background:var(--color-background-tertiary)}
.app{width:100%;font-family:var(--font-sans);background:var(--color-background-tertiary);min-height:100vh;display:flex;flex-direction:column}
.hero{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:16px 16px 12px}
.hero-label{font-size:11px;font-weight:500;color:var(--color-text-success);letter-spacing:0.08em;text-transform:uppercase}
.hero-title{font-size:22px;font-weight:500;color:var(--color-text-primary);margin-top:2px}
.hero-sub{font-size:12px;color:var(--color-text-tertiary);margin-top:2px}
.cd-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.cd-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;text-align:center}
.cd-label{font-size:10px;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:0.05em}
.cd-val{font-size:22px;font-weight:500;color:var(--color-text-primary);line-height:1.1}
.cd-sub{font-size:10px;color:var(--color-text-tertiary);margin-top:1px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px 16px 0;background:var(--color-background-primary)}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 6px;text-align:center}
.stat-icon{font-size:14px;margin-bottom:2px}
.stat-num{font-size:18px;font-weight:500;line-height:1}
.stat-lbl{font-size:9px;color:var(--color-text-tertiary);margin-top:2px}
.stat-watch .stat-num{color:var(--color-text-success)}
.stat-partial .stat-num{color:var(--color-text-info)}
.stat-canada .stat-num{color:var(--color-text-warning)}
.stat-miss .stat-num{color:var(--color-text-secondary)}
.tabs-wrap{background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);padding:10px 16px 10px}
.tab-row{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.tab-row::-webkit-scrollbar{display:none}
.stab{font-size:12px;font-weight:500;padding:6px 14px;border-radius:99px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;white-space:nowrap;flex-shrink:0}
.stab.active{background:var(--color-background-success);color:var(--color-text-success);border-color:transparent}
.filter-row{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:10px 16px 0;background:var(--color-background-primary)}
.filter-row::-webkit-scrollbar{display:none}
.fb{font-size:11px;font-weight:500;padding:4px 12px;border-radius:99px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;white-space:nowrap;flex-shrink:0}
.fb.active.all{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:transparent}
.fb.active.watch{background:var(--color-background-success);color:var(--color-text-success);border-color:transparent}
.fb.active.partial{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.fb.active.canada{background:var(--color-background-warning);color:var(--color-text-warning);border-color:transparent}
.fb.active.miss{background:var(--color-background-secondary);color:var(--color-text-secondary);border-color:transparent}
.games-area{flex:1;padding:10px 16px 80px}
.day-block{margin-bottom:8px;background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-tertiary);overflow:hidden}
.day-header{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;user-select:none}
.day-text{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.05em;text-transform:uppercase;flex:1}
.wk-badge{font-size:10px;background:var(--color-background-success);color:var(--color-text-success);padding:2px 8px;border-radius:99px;font-weight:500}
.day-count{font-size:11px;color:var(--color-text-tertiary)}
.day-chevron{font-size:16px;color:var(--color-text-tertiary);transition:transform 0.2s}
.day-block.open .day-chevron{transform:rotate(180deg)}
.day-body{display:none;border-top:0.5px solid var(--color-border-tertiary)}
.day-block.open .day-body{display:block}
.game-card{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:0.5px solid var(--color-border-tertiary)}
.game-card:last-child{border-bottom:none}
.game-card.miss{opacity:0.45}
.si{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.si-watch{background:var(--color-background-success);color:var(--color-text-success)}
.si-partial{background:var(--color-background-info);color:var(--color-text-info)}
.si-canada{background:var(--color-background-warning);color:var(--color-text-warning)}
.si-miss{background:var(--color-background-secondary);color:var(--color-text-tertiary)}
.g-info{flex:1;min-width:0}
.g-match{font-size:13px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.g-note{font-size:11px;color:var(--color-text-tertiary);margin-top:1px}
.g-time{font-size:12px;color:var(--color-text-tertiary);white-space:nowrap}
.empty{text-align:center;color:var(--color-text-tertiary);font-size:13px;padding:3rem 0}
</style>

const iconMap={watch:"ti-eye",partial:"ti-clock",canada:"ti-map-pin",miss:"ti-briefcase"};
const siClass={watch:"si-watch",partial:"si-partial",canada:"si-canada",miss:"si-miss"};
let aF="all",aS="all";

function daysUntil(){
  const diff=Math.ceil((new Date("2026-06-11")-new Date())/(864e5));
  document.getElementById("ddays").textContent=diff>0?diff:"Live!";
}

function render(){
  const scope=games.filter(g=>aS==="all"||g.stage===aS);
  const filtered=scope.filter(g=>aF==="all"||g.status===aF);
  document.getElementById("s-watch").textContent=scope.filter(g=>g.status==="watch").length;
  document.getElementById("s-partial").textContent=scope.filter(g=>g.status==="partial").length;
  document.getElementById("s-miss").textContent=scope.filter(g=>g.status==="miss").length;

  const days=[...new Set(filtered.map(g=>g.day))];
  const container=document.getElementById("games-list");
  if(!filtered.length){container.innerHTML='<div class="empty">No games match.</div>';return;}

  const weekendDays=days.filter(d=>filtered.find(g=>g.day===d&&g.weekend));
  const defaultOpen=weekendDays.length?weekendDays:[days[0]];

  container.innerHTML=days.map(day=>{
    const dg=filtered.filter(g=>g.day===day);
    const isW=dg[0].weekend;
    const open=defaultOpen.includes(day);
    return`<div class="day-block${open?' open':''}" data-day="${day}">
      <div class="day-header">
        <span class="day-text">${day}</span>
        ${isW?'<span class="wk-badge">Weekend</span>':''}
        <span class="day-count">${dg.length} game${dg.length>1?'s':''}</span>
        <i class="ti ti-chevron-down day-chevron" aria-hidden="true"></i>
      </div>
      <div class="day-body">${dg.map(g=>`
        <div class="game-card ${g.status}">
          <div class="si ${siClass[g.status]}"><i class="ti ${iconMap[g.status]}" aria-hidden="true"></i></div>
          <div class="g-info">
            <div class="g-match">${g.match}</div>
            ${g.note?`<div class="g-note">${g.note}</div>`:''}
          </div>
          <div class="g-time">${g.time}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  container.querySelectorAll(".day-header").forEach(h=>{
    h.addEventListener("click",()=>h.closest(".day-block").classList.toggle("open"));
  });
}

document.getElementById("stage-tabs").addEventListener("click",e=>{
  const b=e.target.closest(".stab");if(!b)return;
  aS=b.dataset.stage;
  document.querySelectorAll(".stab").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");render();
});
