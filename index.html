<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WC 2026 — My Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dim: #1a3a1a;
    --green-mid: #2d5a20;
    --green-bright: #5aaa40;
    --green-pale: #3d7a2a;
    --blue-dim: #0d1f35;
    --blue-bright: #4a90d9;
    --amber-dim: #2a1f08;
    --amber-bright: #c98a20;
    --surface: #141414;
    --surface2: #161616;
    --border: #1f1f1f;
    --border2: #222222;
    --text-primary: #d0d0d0;
    --text-secondary: #666;
    --text-muted: #444;
    --bg: #0f0f0f;
  }

  html, body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .app {
    max-width: 600px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Hero */
  .hero {
    background: #111;
    padding: env(safe-area-inset-top, 52px) 20px 20px;
    padding-top: max(52px, env(safe-area-inset-top));
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: var(--green-dim);
    opacity: 0.5;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: -30px; left: 20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: #0d2b0d;
    opacity: 0.7;
  }
  .hero-inner { position: relative; z-index: 1; }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .hero-eyebrow {
    font-size: 11px; font-weight: 500;
    color: var(--green-bright);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .hero-title { font-size: 26px; font-weight: 600; color: #f0f0f0; line-height: 1.15; }
  .hero-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .bell-btn {
    width: 38px; height: 38px; border-radius: 50%;
    background: #1c1c1c; border: 0.5px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-secondary); font-size: 17px; cursor: pointer;
  }

  .countdown {
    background: #161f16;
    border: 0.5px solid var(--green-dim);
    border-radius: 14px;
    padding: 12px 16px;
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .cd-block { text-align: center; flex: 1; }
  .cd-label { font-size: 10px; color: var(--green-pale); letter-spacing: 0.04em; text-transform: uppercase; }
  .cd-val { font-size: 20px; font-weight: 600; color: #f0f0f0; margin-top: 2px; }
  .cd-sub { font-size: 10px; color: var(--text-muted); margin-top: 1px; }
  .cd-divider { width: 0.5px; height: 36px; background: var(--border2); flex-shrink: 0; }

  /* Stats */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 16px 16px 0;
  }
  .stat-card {
    border-radius: 14px; padding: 13px 14px;
    border: 0.5px solid var(--border);
    background: var(--surface2);
  }
  .stat-card.green { border-color: var(--green-dim); }
  .stat-card.blue  { border-color: var(--blue-dim); }
  .stat-card.amber { border-color: var(--amber-dim); }
  .sc-icon { font-size: 15px; margin-bottom: 7px; }
  .green .sc-icon { color: var(--green-mid); }
  .blue  .sc-icon { color: #1a4a80; }
  .amber .sc-icon { color: #7a4a10; }
  .gray  .sc-icon { color: #2a2a2a; }
  .sc-num { font-size: 26px; font-weight: 600; line-height: 1; }
  .green .sc-num { color: var(--green-bright); }
  .blue  .sc-num { color: var(--blue-bright); }
  .amber .sc-num { color: var(--amber-bright); }
  .gray  .sc-num { color: #555; }
  .sc-lbl { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  /* Tabs */
  .section-head { padding: 18px 16px 10px; }
  .section-title { font-size: 11px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.07em; text-transform: uppercase; }

  .scroll-row {
    display: flex; gap: 6px;
    padding: 0 16px 12px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .scroll-row::-webkit-scrollbar { display: none; }

  .stab {
    font-size: 12px; font-weight: 500;
    padding: 7px 14px; border-radius: 99px;
    border: 0.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text-secondary);
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .stab.active { background: var(--green-dim); color: var(--green-bright); border-color: var(--green-mid); }

  .fb {
    font-size: 11px; font-weight: 500;
    padding: 6px 12px; border-radius: 99px;
    border: 0.5px solid var(--border2);
    background: #0f0f0f; color: var(--text-secondary);
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .fb.active.all, .fb.active.miss { background: #222; color: #aaa; border-color: transparent; }
  .fb.active.watch   { background: var(--green-dim); color: var(--green-bright); border-color: transparent; }
  .fb.active.partial { background: var(--blue-dim);  color: var(--blue-bright);  border-color: transparent; }
  .fb.active.canada  { background: var(--amber-dim); color: var(--amber-bright); border-color: transparent; }

  /* Games */
  .games-list { padding: 0 16px 100px; flex: 1; }

  .day-row { display: flex; align-items: center; gap: 8px; padding: 14px 0 8px; }
  .day-text { font-size: 11px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; white-space: nowrap; }
  .wk-badge { font-size: 10px; font-weight: 500; background: var(--green-dim); color: var(--green-pale); padding: 2px 8px; border-radius: 99px; white-space: nowrap; }
  .day-line { flex: 1; height: 0.5px; background: #1a1a1a; }

  .game-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 11px;
    -webkit-tap-highlight-color: transparent;
  }
  .game-card:active { opacity: 0.7; }
  .game-card.watch   { border-color: var(--green-dim); }
  .game-card.partial { border-color: var(--blue-dim); }
  .game-card.canada  { border-color: var(--amber-dim); }
  .game-card.miss    { opacity: 0.38; }

  .status-icon {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 15px;
  }
  .si-watch   { background: var(--green-dim); color: var(--green-bright); }
  .si-partial { background: var(--blue-dim);  color: var(--blue-bright); }
  .si-canada  { background: var(--amber-dim); color: var(--amber-bright); }
  .si-miss    { background: #161616; color: #2a2a2a; }

  .game-info { flex: 1; min-width: 0; }
  .game-match { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .game-note  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .game-time  { font-size: 12px; color: var(--text-secondary); white-space: nowrap; flex-shrink: 0; }

  .empty { text-align: center; color: var(--text-muted); font-size: 13px; padding: 3rem 0; }

  /* Nav */
  .navbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: space-around;
    padding: 10px 0;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    background: #0f0f0f;
    border-top: 0.5px solid #1a1a1a;
    z-index: 100;
  }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; color: #333; cursor: pointer; min-width: 60px; -webkit-tap-highlight-color: transparent; }
  .nav-item.active { color: var(--green-bright); }
  .nav-item i { font-size: 22px; }
  .nav-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--green-bright); margin-top: 1px; }
</style>
</head>

const iconMap={watch:"ti-eye",partial:"ti-clock",canada:"ti-map-pin",miss:"ti-briefcase"};
const siMap={watch:"si-watch",partial:"si-partial",canada:"si-canada",miss:"si-miss"};
let aF="all",aS="all";

function daysUntil(){
  const diff=Math.ceil((new Date("2026-06-11T15:00:00-06:00")-new Date())/(864e5));
  document.getElementById("ddays").textContent=diff>0?diff:"Live!";
}

function render(){
  const filtered=games.filter(g=>(aS==="all"||g.stage===aS)&&(aF==="all"||g.status===aF));
  const scope=games.filter(g=>aS==="all"||g.stage===aS);
  document.getElementById("s-watch").textContent=scope.filter(g=>g.status==="watch").length;
  document.getElementById("s-partial").textContent=scope.filter(g=>g.status==="partial").length;
  document.getElementById("s-miss").textContent=scope.filter(g=>g.status==="miss").length;
  const days=[...new Set(filtered.map(g=>g.day))];
  let html="";
  if(!filtered.length){html='<div class="empty">No games match this filter.</div>';}
  else{
    days.forEach(day=>{
      const dg=filtered.filter(g=>g.day===day);
      const isW=dg[0].weekend;
      html+=`<div class="day-row"><span class="day-text">${day}</span>${isW?'<span class="wk-badge">Weekend</span>':''}<div class="day-line"></div></div>`;
      dg.forEach(g=>{
        html+=`<div class="game-card ${g.status}"><div class="status-icon ${siMap[g.status]}"><i class="ti ${iconMap[g.status]}"></i></div><div class="game-info"><div class="game-match">${g.match}</div>${g.note?`<div class="game-note">${g.note}</div>`:''}</div><div class="game-time">${g.time}</div></div>`;
      });
    });
  }
  document.getElementById("games-list").innerHTML=html;
}

document.getElementById("stage-tabs").addEventListener("click",e=>{
  const b=e.target.closest(".stab");if(!b)return;
  aS=b.dataset.stage;
  document.querySelectorAll(".stab").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");render();
});
document.getElementById("filters").addEventListener("click",e=>{
  const b=e.target.closest(".fb");if(!b)return;
  aF=b.dataset.filter;
  document.querySelectorAll(".fb").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");render();
});

daysUntil();render();
</script>
